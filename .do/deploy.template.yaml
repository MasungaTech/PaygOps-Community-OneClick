spec:
  name: paygops-community
  region: nyc3
  services:
    - name: web
      image:
        registry_type: GHCR
        repository: masungatech/paygops-community
        tag: latest
      http_port: 8000
      routes:
        - path: /
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-2gb
      run_command: mkdir -p /setup_data && touch /setup_data/ready && /crm/entrypoint.sh start_web_app
      envs:
        - key: ENV_VAR
          value: PROD
        - key: PAYG_URL
          value: ${APP_URL}
        - key: PG_HOST
          value: ${db.HOSTNAME}
        - key: PG_PORT
          value: ${db.PORT}
        - key: PG_USER
          value: ${db.USERNAME}
        - key: PG_PASSWORD
          value: ${db.PASSWORD}
          type: SECRET
        - key: REDIS_SERVER_ADDRESS
          value: ${redis.HOSTNAME}
        - key: SECRET_KEY
          scope: RUN_TIME
          type: SECRET
        - key: INITIAL_ADMIN_EMAIL
          scope: RUN_TIME
        - key: INITIAL_ADMIN_PASSWORD
          scope: RUN_TIME
          type: SECRET
    - name: api
      image:
        registry_type: GHCR
        repository: masungatech/paygops-community
        tag: latest
      http_port: 6789
      routes:
        - path: /api/v1
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-2gb
      run_command: mkdir -p /setup_data && touch /setup_data/ready && /crm/entrypoint.sh start_api_app
      envs:
        - key: ENV_VAR
          value: PROD
        - key: PAYG_URL
          value: ${APP_URL}
        - key: PG_HOST
          value: ${db.HOSTNAME}
        - key: PG_PORT
          value: ${db.PORT}
        - key: PG_USER
          value: ${db.USERNAME}
        - key: PG_PASSWORD
          value: ${db.PASSWORD}
          type: SECRET
        - key: REDIS_SERVER_ADDRESS
          value: ${redis.HOSTNAME}
        - key: SECRET_KEY
          scope: RUN_TIME
          type: SECRET
        - key: INITIAL_ADMIN_EMAIL
          scope: RUN_TIME
        - key: INITIAL_ADMIN_PASSWORD
          scope: RUN_TIME
          type: SECRET
    - name: celery-worker
      image:
        registry_type: GHCR
        repository: masungatech/paygops-community
        tag: latest
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-2gb
      run_command: mkdir -p /setup_data && touch /setup_data/ready && /crm/entrypoint.sh start_worker
      envs:
        - key: ENV_VAR
          value: PROD
        - key: PAYG_URL
          value: ${APP_URL}
        - key: PG_HOST
          value: ${db.HOSTNAME}
        - key: PG_PORT
          value: ${db.PORT}
        - key: PG_USER
          value: ${db.USERNAME}
        - key: PG_PASSWORD
          value: ${db.PASSWORD}
          type: SECRET
        - key: REDIS_SERVER_ADDRESS
          value: ${redis.HOSTNAME}
        - key: SECRET_KEY
          scope: RUN_TIME
          type: SECRET
        - key: INITIAL_ADMIN_EMAIL
          scope: RUN_TIME
        - key: INITIAL_ADMIN_PASSWORD
          scope: RUN_TIME
          type: SECRET
    - name: celery-heavy-worker
      image:
        registry_type: GHCR
        repository: masungatech/paygops-community
        tag: latest
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-2gb
      run_command: mkdir -p /setup_data && touch /setup_data/ready && /crm/entrypoint.sh start_heavy_worker
      envs:
        - key: ENV_VAR
          value: PROD
        - key: PAYG_URL
          value: ${APP_URL}
        - key: PG_HOST
          value: ${db.HOSTNAME}
        - key: PG_PORT
          value: ${db.PORT}
        - key: PG_USER
          value: ${db.USERNAME}
        - key: PG_PASSWORD
          value: ${db.PASSWORD}
          type: SECRET
        - key: REDIS_SERVER_ADDRESS
          value: ${redis.HOSTNAME}
        - key: SECRET_KEY
          scope: RUN_TIME
          type: SECRET
        - key: INITIAL_ADMIN_EMAIL
          scope: RUN_TIME
        - key: INITIAL_ADMIN_PASSWORD
          scope: RUN_TIME
          type: SECRET
  jobs:
    - name: runtime-setup
      kind: PRE_DEPLOY
      image:
        registry_type: GHCR
        repository: masungatech/paygops-community
        tag: latest
      run_command: /crm/entrypoint.sh runtime_setup
      envs:
        - key: ENV_VAR
          value: PROD
        - key: PG_HOST
          value: ${db.HOSTNAME}
        - key: PG_PORT
          value: ${db.PORT}
        - key: PG_USER
          value: ${db.USERNAME}
        - key: PG_PASSWORD
          value: ${db.PASSWORD}
          type: SECRET
        - key: REDIS_SERVER_ADDRESS
          value: ${redis.HOSTNAME}
        - key: SECRET_KEY
          scope: RUN_TIME
          type: SECRET
        - key: INITIAL_ADMIN_EMAIL
          scope: RUN_TIME
        - key: INITIAL_ADMIN_PASSWORD
          scope: RUN_TIME
          type: SECRET
  databases:
    - name: db
      engine: PG
      production: false
      version: "16"
    - name: redis
      engine: REDIS
      production: false
      version: "7"
